<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance - Staff</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/staff-portal-shell.css">
</head>
<body class="staff-portal-page" data-page="attendance">
  <div class="portal-shell">
    <header class="portal-header">
      <div class="portal-header-left">
        <div class="portal-logo">CC</div>
        <div class="portal-title">Staff Portal</div>
      </div>
      <div class="portal-header-right">
        <div class="portal-user">Signed in as <strong data-staff-name>Staff</strong></div>
        <button class="btn btn-outline btn-sm" type="button" data-action="logout">Logout</button>
      </div>
    </header>

    <div class="portal-main">
      <aside class="portal-sidebar">
        <nav class="portal-nav">
          <a href="/staff/dashboard.html" data-nav="dashboard">Dashboard</a>
          <a href="/staff/students.html" data-nav="students">Students</a>
          <a href="/staff/applications.html" data-nav="applications">Applications</a>
          <a href="/staff/opportunities.html" data-nav="opportunities">Opportunities</a>
          <a href="/staff/attendance.html" data-nav="attendance">Attendance</a>
          <a href="/staff/analytics.html" data-nav="analytics">Analytics</a>
          <a href="/staff/queries.html" data-nav="queries">Queries</a>
          <a href="/staff/approvals.html" data-nav="approvals">Approvals</a>
          <a href="/staff/profile.html" data-nav="profile">Profile</a>
          <button type="button" data-action="logout">Logout</button>
        </nav>
      </aside>

      <main class="portal-content">
        <div class="page-topbar">
          <h1 class="page-title">Student Attendance</h1>
          <p class="page-subtitle">View and manage student attendance records.</p>
        </div>

        <section class="content-card">
          <div class="toolbar">
            <select id="filterStudent" class="form-control">
              <option value="">All Students</option>
            </select>
            <select id="filterDept" class="form-control">
              <option value="">All Departments</option>
              <option value="CSE">Computer Science</option>
              <option value="ECE">Electronics</option>
              <option value="MECH">Mechanical</option>
              <option value="CIVIL">Civil</option>
              <option value="EEE">Electrical</option>
            </select>
            <button class="btn btn-primary btn-sm" id="refreshAttendance">Refresh</button>
          </div>
          <div id="attendanceContainer">
            <div class="empty-state">
              <div class="empty-state-icon">📋</div>
              <h3>No attendance records found</h3>
              <p>Click "Refresh" to load attendance records</p>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/staff-portal-common.js"></script>
  <script src="/js/staff-attendance-page.js"></script>
</body>
</html>
