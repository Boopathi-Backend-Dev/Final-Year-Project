<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/student-portal-shell.css">
</head>
<body class="student-portal-page" data-page="profile">
  <div class="portal-shell">
    <header class="portal-header">
      <div class="portal-header-left">
        <div class="portal-logo">CC</div>
        <div class="portal-title">Student Portal</div>
      </div>
      <div class="portal-header-right">
        <div class="portal-user">Signed in as <strong data-student-name>Student</strong></div>
        <button class="btn btn-outline btn-sm" type="button" data-action="logout">Logout</button>
      </div>
    </header>

    <div class="portal-main">
      <aside class="portal-sidebar">
        <nav class="portal-nav">
          <a href="/student/dashboard.html" data-nav="dashboard">Dashboard</a>
          <a href="/student/applications.html" data-nav="applications">Applications</a>
          <a href="/student/opportunities.html" data-nav="opportunities">Opportunities</a>
          <a href="/student/extra-courses.html" data-nav="extra-courses">Extra Courses</a>
          <a href="/student/wishlist.html" data-nav="wishlist">Wishlist</a>
          <a href="/student/attendance.html" data-nav="attendance">Attendance</a>
          <a href="/student/notifications.html" data-nav="notifications">Notifications</a>
          <a href="/student/queries.html" data-nav="queries">Queries</a>
          <a href="/student/profile.html" data-nav="profile">Profile</a>
          <a href="/student/ai-assistant.html" data-nav="ai-assistant">AI Assistant</a>
          <button type="button" data-action="logout">Logout</button>
        </nav>
      </aside>

      <main class="portal-content">
        <div class="page-topbar">
          <h1 class="page-title">Profile</h1>
          <p class="page-subtitle">Personal details, resume upload, and profile updates.</p>
        </div>

        <section class="content-card">
          <div class="toolbar">
            <button class="btn btn-outline btn-sm" type="button" id="editProfileBtn">Edit Profile</button>
            <button class="btn btn-outline btn-sm hidden" type="button" id="cancelEditProfileBtn">Cancel</button>
          </div>

          <div id="profileViewCard">
            <!-- Profile content will be dynamically generated -->
          </div>

          <form id="profileForm" class="hidden" enctype="multipart/form-data">
            <div class="split-grid">
              <div class="form-group">
                <label for="registerNumber">Register Number</label>
                <input id="registerNumber" name="registerNumber" type="text">
              </div>
              <div class="form-group">
                <label for="department">Department</label>
                <select id="department" name="department">
                  <option value="">Select</option>
                  <option value="CSE">CSE</option>
                  <option value="ECE">ECE</option>
                  <option value="MECH">MECH</option>
                  <option value="CIVIL">CIVIL</option>
                  <option value="EEE">EEE</option>
                </select>
              </div>
              <div class="form-group">
                <label for="yearOfStudy">Year Of Study</label>
                <select id="yearOfStudy" name="yearOfStudy">
                  <option value="">Select</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </div>
              <div class="form-group">
                <label for="phone">Phone</label>
                <input id="phone" name="phone" type="text">
              </div>
              <div class="form-group">
                <label for="cgpa">CGPA</label>
                <input id="cgpa" name="cgpa" type="number" step="0.01" min="0" max="10">
              </div>
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                  <option value="">Select</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label for="dateOfBirth">Date of Birth</label>
                <input id="dateOfBirth" name="dateOfBirth" type="date">
              </div>
              <div class="form-group">
                <label for="skills">Skills</label>
                <input id="skills" name="skills" type="text" placeholder="JavaScript, Python">
              </div>
              <div class="form-group">
                <label for="resume">Resume Upload</label>
                <input id="resume" name="resume" type="file" accept="application/pdf">
              </div>
            </div>
            <div class="form-group">
              <label for="address">Address</label>
              <textarea id="address" name="address" rows="3"></textarea>
            </div>
            <div class="toolbar">
              <button class="btn btn-primary btn-sm" type="submit">Save Profile</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/student-portal-common.js"></script>
  <script src="/js/student-profile-page.js"></script>
</body>
</html>
