<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Profile</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/company-portal-shell.css">
</head>
<body class="company-portal-page" data-page="profile">
  <div class="portal-shell">
    <header class="portal-header">
      <div class="portal-header-left">
        <div class="portal-logo">CC</div>
        <div class="portal-title">Company Portal</div>
      </div>
      <div class="portal-header-right">
        <div class="portal-user">Signed in as <strong data-company-name>Company</strong></div>
        <button class="btn btn-outline btn-sm" type="button" data-action="logout">Logout</button>
      </div>
    </header>

    <div class="portal-main">
      <aside class="portal-sidebar">
        <nav class="portal-nav">
          <a href="/company/dashboard.html" data-nav="dashboard">Dashboard</a>
          <a href="/company/profile.html" data-nav="profile">Profile</a>
          <a href="/company/jobs.html" data-nav="jobs">Jobs</a>
          <a href="/company/courses.html" data-nav="courses">Courses</a>
          <a href="/company/internships.html" data-nav="internships">Internships</a>
          <a href="/company/applicants.html" data-nav="applicants">Applicants</a>
          <a href="/company/attendance.html" data-nav="attendance">Attendance</a>
          <a href="/company/opportunities.html" data-nav="opportunities">Opportunities</a>
          <a href="/company/queries.html" data-nav="queries">Queries</a>
          <button type="button" data-action="logout">Logout</button>
        </nav>
      </aside>

      <main class="portal-content">
        <div class="page-topbar">
          <h1 class="page-title">Company Profile</h1>
          <p class="page-subtitle">Manage your company information and details.</p>
        </div>

        <section class="content-card">
          <div class="toolbar">
            <button class="btn btn-primary btn-sm" id="editProfileBtn" style="display: none;">Edit Profile</button>
            <button class="btn btn-outline btn-sm" id="cancelEditBtn" style="display: none;">Cancel</button>
          </div>

          <div id="profileView" style="display: none;">
            <!-- Profile content will be dynamically generated -->
          </div>

          <form id="profileForm" style="display: none;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
              <div class="form-group">
                <label for="name">Company Name *</label>
                <input type="text" id="name" name="name" placeholder="Enter company name" required class="form-control" />
              </div>
              <div class="form-group">
                <label for="industry">Industry / Sector</label>
                <select id="industry" name="industry" class="form-control">
                  <option value="">Select Industry</option>
                  <option value="IT">Information Technology</option>
                  <option value="Software">Software Development</option>
                  <option value="Education">Education / Training</option>
                  <option value="Finance">Finance / Banking</option>
                  <option value="Healthcare">Healthcare</option>
                  <option value="Manufacturing">Manufacturing</option>
                  <option value="Consulting">Consulting</option>
                  <option value="E-commerce">E-commerce</option>
                  <option value="Telecom">Telecommunications</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label for="description">Company Description</label>
              <textarea id="description" name="description" placeholder="Brief description about your company..." rows="3" class="form-control"></textarea>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
              <div class="form-group">
                <label for="email">Contact Email *</label>
                <input type="email" id="email" name="email" placeholder="hr@company.com" required class="form-control" />
              </div>
              <div class="form-group">
                <label for="phone">Contact Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" class="form-control" />
              </div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
              <div class="form-group">
                <label for="website">Website</label>
                <input type="url" id="website" name="website" placeholder="https://www.company.com" class="form-control" />
              </div>
              <div class="form-group">
                <label for="foundedYear">Founded Year</label>
                <input type="number" id="foundedYear" name="foundedYear" placeholder="2010" min="1900" max="2030" class="form-control" />
              </div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
              <div class="form-group">
                <label for="companySize">Company Size</label>
                <select id="companySize" name="companySize" class="form-control">
                  <option value="">Select Size</option>
                  <option value="1-10">1-10 employees</option>
                  <option value="11-50">11-50 employees</option>
                  <option value="51-200">51-200 employees</option>
                  <option value="201-500">201-500 employees</option>
                  <option value="501-1000">501-1000 employees</option>
                  <option value="1000+">1000+ employees</option>
                </select>
              </div>
              <div class="form-group">
                <label for="companyType">Company Type</label>
                <select id="companyType" name="companyType" class="form-control">
                  <option value="">Select Type</option>
                  <option value="Private">Private Limited</option>
                  <option value="Public">Public Limited</option>
                  <option value="Startup">Startup</option>
                  <option value="MNC">Multinational (MNC)</option>
                  <option value="Government">Government</option>
                  <option value="NGO">NGO / Non-Profit</option>
                  <option value="Partnership">Partnership</option>
                </select>
              </div>
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label for="address">Office Address</label>
              <textarea id="address" name="address" placeholder="Full office address..." rows="2" class="form-control"></textarea>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1rem;">
              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" placeholder="Mumbai" class="form-control" />
              </div>
              <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" placeholder="Maharashtra" class="form-control" />
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Update Profile</button>
          </form>
        </section>
      </main>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/company-portal-common.js"></script>
  <script src="/js/company-profile-page.js"></script>
</body>
</html>
